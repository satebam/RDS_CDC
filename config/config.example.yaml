connections:
  source_connection_string: "Driver={ODBC Driver 18 for SQL Server};Server=your-azure-sql.database.windows.net;Database=your-db;Uid=your-user;Pwd=your-password;Encrypt=yes;TrustServerCertificate=no;Connection Timeout=30;"
  target_connection_string: "Driver={ODBC Driver 18 for SQL Server};Server=your-rds-endpoint.region.rds.amazonaws.com;Database=your-db;Uid=your-user;Pwd=your-password;Encrypt=yes;TrustServerCertificate=yes;Connection Timeout=30;"

state_store:
  schema_name: cdc_sync

tables:
  - source_schema: dbo
    source_table: customers
    capture_instance: dbo_customers
    batch_size: 50000
    polling_interval_seconds: 2.0
    checksum_validation: true

  - source_schema: dbo
    source_table: orders
    capture_instance: dbo_orders
    batch_size: 10000
    polling_interval_seconds: 5.0
    columns:
      denylist:
        - internal_notes

  - source_schema: sales
    source_table: line_items
    target_schema: sales
    target_table: line_items
    capture_instance: sales_line_items
    continue_on_validation_failure: true

cutover_timeout_seconds: 3600
shutdown_grace_period_seconds: 30
backpressure_buffer_threshold: 100000
